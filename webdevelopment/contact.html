<body class="contact-page">

    <!-- Header and navigation -->

        <div class="logo-area">
            <img
                src="logo.png"
                alt="Stephen Bean site logo"
                class="site-logo"
            >

        </div>

                <li><a href="index.html">Home</a></li>

                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- Contact page content -->
    <main class="contact-main">
        <section class="contact-section">
            <h1>Contact Me</h1>

            <p>
                Thank you for stopping by! Complete the form below
                if you would like to contact me.
            </p>

            <!-- Contact form -->
            <form class="contact-form" action="#" method="get">

                <div class="form-group">
                    <label for="title">Title</label>
                    <select id="title" name="title" required>
                        <option value="" disabled selected>
                            Select your title
                        </option>
                        <option value="mr">Mr.</option>
                        <option value="ms">Ms.</option>
                        <option value="mrs">Mrs.</option>
                        <option value="dr">Dr.</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="full-name">Full Name</label>
                    <input
                        type="text"
                        id="full-name"
                        name="full-name"
                        placeholder="Enter your full name"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="Enter your email address"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="contact-reason">Reason for Contact</label>
                    <select
                        id="contact-reason"
                        name="contact-reason"
                        required
                    >
                        <option value="" disabled selected>
                            Select a reason for contacting me
                        </option>
                        <option value="employment">
                            Employment Opportunity
                        </option>
                        <option value="networking">
                            Professional Networking
                        </option>
                        <option value="project">
                            Project Question
                        </option>
                        <option value="general">
                            General Message
                        </option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea
                        id="message"
                        name="message"
                        rows="7"
                        placeholder="Enter your message"
                        required
                    ></textarea>
                </div>

                <button type="submit" class="submit-button">
                    Submit
                </button>
            </form>
        </section>
    </main>

    <!-- Contact footer -->
    <footer class="contact-footer">
        <div class="footer-contact">
            <p>
                <img
                    src="images/phone-icon.png"
                    alt="Phone"
                    class="contact-icon"
                >
                (555) 555-4355
            </p>

            <p>
                <img
                    src="images/email-icon.png"
                    alt="Email"
                    class="contact-icon"
                >
                <a href="mailto:swbw42@missouri.edu">
                    swbw42@missouri.edu
                </a>
            </p>
        </div>
    </footer>

</body>
